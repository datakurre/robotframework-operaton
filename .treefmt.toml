# The formatter multiplexer - https://treefmt.com
# Configuration for treefmt: python, java, and robot framework formatters.

# Do not exit with error if a configured formatter is missing.
# Useful during bootstrapping before all formatters are installed.
allow-missing-formatter = true

# Exclude the reference checkout and Maven build output from all formatters.
excludes = ["tmp/**", "target/**"]

[formatter.black]
command = "black"
includes = ["*.py", "*.pyi"]

[formatter.google-java-format]
command = "google-java-format"
options = ["--replace"]
includes = ["*.java"]

[formatter.robocop]
command = "robocop"
options = ["format"]
includes = ["*.robot"]

[formatter.prettier]
command = "prettier"
options = ["--write"]
includes = ["*.js", "*.mjs", "*.json", "*.ts", "*.jsx", "*.tsx"]
