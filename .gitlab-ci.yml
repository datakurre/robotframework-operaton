stages:
  - test
  - release
  - pages

variables:
  MAVEN_OPTS: >-
    -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository
    -Dmaven.artifact.threads=4
    -Dpolyglot.engine.WarnInterpreterOnly=false
  NIX_CACHE: "https://cache.nixos.org"

.devenv-job: &devenv-job
  image: ghcr.io/cachix/devenv/devenv:latest
  tags:
    - executor-podman
  before_script:
    - |
      if [ -n "${NETRC:-}" ] && [ -n "${NIX_CACHE:-}" ]; then
        export NIX_CONFIG="accept-flake-config = true
        extra-sandbox-paths = ${NETRC}
        netrc-file = ${NETRC}
        substituters = ${NIX_CACHE}?trusted=true
      else
        export NIX_CONFIG="accept-flake-config = true"
      fi
  after_script:
    - |
      if [ -n "${NETRC:-}" ] && [ -n "${NIX_CACHE:-}" ] && [ -e .devenv/profiles/shell/profile ]; then
        nix-store -qR "$(readlink -f .devenv/profiles/shell/profile)" | \
          xargs nix copy --accept-flake-config --option extra-sandbox-paths "${NETRC}" --option netrc-file "${NETRC}" --option substituters "${NIX_CACHE}?trusted=true" --to "${NIX_CACHE}" || \
          echo "Nix cache push failed; continuing without failing job."
      else
        echo "Skipping Nix cache push (NETRC/NIX_CACHE missing or shell profile not realized)."
      fi

# ── Cache Maven local repository across jobs/pipelines ────────────────────────
# The graalpy-maven-plugin downloads Python wheels into ~/.m2 on first build;
# subsequent pipelines reuse the cache and are significantly faster.
.maven-cache: &maven-cache
  cache:
    key: maven-$CI_COMMIT_REF_SLUG
    paths:
      - .m2/repository/

# ── Test ──────────────────────────────────────────────────────────────────────

check:
  stage: test
  <<: [*devenv-job, *maven-cache]
  script:
    # Formatting gate.
    - devenv shell --no-eval-cache -- treefmt --ci
    # Python type-check gate.
    - devenv shell --no-eval-cache -- make mypy
    # Compile-only gate: validates Java + test sources without executing tests.
    - devenv shell --no-eval-cache -- mvn -q -DskipTests test-compile
  except:
    - tags   # release job below covers tag pipelines

test:
  stage: test
  <<: [*devenv-job, *maven-cache]
  # Blocking Robot gate + report collector.
  script:
    # Compile test classpath and run Robot suites with rich report output.
    - devenv shell --no-eval-cache -- mvn -q -DskipTests test-compile
    - mkdir -p robot-results
    - >
      devenv shell --no-eval-cache -- mvn -q exec:exec
      -Dexec.executable=java
      -Dexec.classpathScope=test
      "-Dexec.args=-cp %classpath org.operaton.bpm.extension.robot.Robot --outputdir robot-results src/test/resources/example"
  artifacts:
    when: always
    expire_in: 2 weeks
    paths:
      - robot-results/output.xml
      - robot-results/log.html
      - robot-results/report.html
      - robot-results/*.png

# ── Release ───────────────────────────────────────────────────────────────────
# Triggered only on version tags (e.g. v1.0.0).
# Pipeline:
#   build-release  — sets version, tests, builds all artefacts, uploads to
#                    the GitLab Generic Package Registry
#   publish-release — creates the GitLab Release with download links

build-release:
  stage: release
  <<: [*devenv-job, *maven-cache]
  only:
    - tags
  script:
    - VERSION=${CI_COMMIT_TAG#v}
    - echo "VERSION=$VERSION" >> release.env

    # Set Maven project version to match the tag.
    - devenv shell --no-eval-cache -- mvn -q versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false

    # Set Python proxy version to match the tag.
    - sed -i "s/^version = .*/version = \"$VERSION\"/" python/pyproject.toml

    # Full test run.
    - devenv shell --no-eval-cache -- mvn test

    # Build fat JAR (standard — no Vasara classes).
    - devenv shell --no-eval-cache -- mvn -Pshade package -DskipTests

    # Build Vasara fat JAR (includes fi.jyu.vasara.* form customizations).
    - devenv shell --no-eval-cache -- mvn -Pshade-vasara package -DskipTests

    # Generate Operaton.libspec using Maven's managed test classpath.
    - mkdir -p docs
    - >
      devenv shell --no-eval-cache -- mvn -q exec:exec
      -Dexec.executable=java
      -Dexec.classpathScope=test
      "-Dexec.args=-cp %classpath org.operaton.bpm.extension.robot.Libdoc docs/Operaton.libspec"

    # Build CPython proxy wheel.
    - devenv shell --no-eval-cache -- python3 -m pip install --quiet --user build
    - devenv shell --no-eval-cache -- python3 -m build --wheel --outdir python/dist/ python/

    # Upload artefacts to the GitLab Generic Package Registry.
    - FAT_JAR="target/operaton-bpm-extension-robot-${VERSION}-fat.jar"
    - VASARA_JAR="target/operaton-bpm-extension-robot-${VERSION}-vasara.jar"
    - WHEEL=$(ls python/dist/*.whl | head -1)
    - >
      curl --silent --show-error --fail
      --header "JOB-TOKEN: $CI_JOB_TOKEN"
      --upload-file "$FAT_JAR"
      "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/operaton-robot/${VERSION}/operaton-bpm-extension-robot-${VERSION}-fat.jar"
    - >
      curl --silent --show-error --fail
      --header "JOB-TOKEN: $CI_JOB_TOKEN"
      --upload-file "$VASARA_JAR"
      "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/operaton-robot/${VERSION}/operaton-bpm-extension-robot-${VERSION}-vasara.jar"
    - >
      curl --silent --show-error --fail
      --header "JOB-TOKEN: $CI_JOB_TOKEN"
      --upload-file "docs/Operaton.libspec"
      "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/operaton-robot/${VERSION}/Operaton.libspec"
    - >
      curl --silent --show-error --fail
      --header "JOB-TOKEN: $CI_JOB_TOKEN"
      --upload-file "$WHEEL"
      "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/operaton-robot/${VERSION}/$(basename $WHEEL)"

  artifacts:
    when: always
    expire_in: 2 weeks
    reports:
      # Export VERSION so the publish-release job can use it in the release block.
      dotenv: release.env
      junit:
        - target/surefire-reports/*.xml
    paths:
      - target/surefire-reports/

publish-release:
  stage: release
  <<: *devenv-job
  needs:
    - job: build-release
      artifacts: true
  only:
    - tags
  script:
    - echo "Creating release for $CI_COMMIT_TAG (version $VERSION)"
    - |
      cat > release.json <<EOF
      {
        "tag_name": "${CI_COMMIT_TAG}",
        "name": "operaton-robot ${CI_COMMIT_TAG}",
        "description": "See [CHANGELOG](CHANGELOG.md) for details.",
        "assets": {
          "links": [
            {
              "name": "Fat JAR (standard)",
              "url": "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/operaton-robot/${VERSION}/operaton-bpm-extension-robot-${VERSION}-fat.jar",
              "link_type": "package"
            },
            {
              "name": "Fat JAR (Vasara form customizations)",
              "url": "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/operaton-robot/${VERSION}/operaton-bpm-extension-robot-${VERSION}-vasara.jar",
              "link_type": "package"
            },
            {
              "name": "Operaton.libspec (RobotCode keyword discovery)",
              "url": "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/operaton-robot/${VERSION}/Operaton.libspec",
              "link_type": "other"
            },
            {
              "name": "CPython proxy wheel",
              "url": "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/operaton-robot/${VERSION}/robotframework_operaton-${VERSION}-py3-none-any.whl",
              "link_type": "package"
            }
          ]
        }
      }
      EOF
    - >
      curl --silent --show-error --fail
      --header "JOB-TOKEN: $CI_JOB_TOKEN"
      --header "Content-Type: application/json"
      --data @release.json
      "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"

# ── GitLab Pages ──────────────────────────────────────────────────────────────
# Publishes keyword reference (Operaton.html) and Operaton.libspec on every
# push to main.  GitLab Pages requires the artifacts to live under public/.

pages:
  stage: pages
  <<: [*devenv-job, *maven-cache]
  only:
    - main
  script:
    # Build the project (skip tests for speed).
    - devenv shell --no-eval-cache -- mvn -q -DskipTests package

    # Generate the HTML keyword reference.
    - mkdir -p public
    - >
      devenv shell --no-eval-cache -- mvn -q exec:exec
      -Dexec.executable=java
      -Dexec.classpathScope=test
      "-Dexec.args=-cp %classpath org.operaton.bpm.extension.robot.Libdoc public/Operaton.html"

    # Generate the libspec file for RobotCode keyword discovery.
    - >
      devenv shell --no-eval-cache -- mvn -q exec:exec
      -Dexec.executable=java
      -Dexec.classpathScope=test
      "-Dexec.args=-cp %classpath org.operaton.bpm.extension.robot.Libdoc public/Operaton.libspec"

    # Add a minimal index.html that redirects to the keyword reference.
    - |
      cat > public/index.html <<'EOF'
      <!DOCTYPE html>
      <html>
      <head>
        <meta charset="utf-8">
        <meta http-equiv="refresh" content="0; url=Operaton.html">
        <title>Operaton Robot Framework Library</title>
      </head>
      <body>
        <p>Redirecting to <a href="Operaton.html">Operaton keyword reference</a>&hellip;</p>
      </body>
      </html>
      EOF

  artifacts:
    paths:
      - public
